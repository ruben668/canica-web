<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Canica</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="300"> <!-- auto-refresh every 5 min -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#1a1411;color:#FFF9F1;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:13px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;}
    .header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center;}
    .wordmark{font-family:'DM Serif Display',serif;font-size:20px;font-style:italic;color:#FFF9F1;}
    .time{font-size:10px;letter-spacing:.1em;color:rgba(255,249,241,.4);}
    .day-label{padding:16px 20px 8px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,249,241,.4);}

    /* BIG NUMBER */
    .revenue-block{padding:0 20px 20px;}
    .revenue-today{font-family:'DM Serif Display',serif;font-size:64px;font-style:italic;line-height:1;color:#FFF9F1;}
    .revenue-today .unit{font-size:24px;color:rgba(255,249,241,.5);}
    .revenue-sub{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,249,241,.4);margin-top:4px;}

    /* PROGRESS BAR */
    .progress-wrap{padding:0 20px 20px;}
    .progress-label{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,249,241,.4);margin-bottom:8px;}
    .progress-track{background:rgba(255,249,241,.1);height:8px;border-radius:0;}
    .progress-fill{height:8px;border-radius:0;transition:width .5s ease;}
    .progress-fill.red   { background:#C7243E; }
    .progress-fill.yellow{ background:#F9C14F; }
    .progress-fill.green { background:#0B6C31; }

    /* METRICS GRID */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:0 20px 20px;}
    .metric{background:rgba(255,249,241,.06);padding:16px;}
    .metric-label{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,249,241,.35);margin-bottom:6px;}
    .metric-value{font-family:'DM Serif Display',serif;font-size:32px;font-style:italic;line-height:1;}
    .metric-value.good  {color:#4CAF50;}
    .metric-value.warn  {color:#F9C14F;}
    .metric-value.bad   {color:#C7243E;}
    .metric-value.neutral{color:#FFF9F1;}
    .metric-sub{font-size:9px;color:rgba(255,249,241,.35);margin-top:4px;}

    /* GAP DIAGNOSIS */
    .gap-block{margin:0 20px 20px;background:rgba(255,249,241,.06);padding:16px;}
    .gap-title{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,249,241,.4);margin-bottom:12px;}
    .gap-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,249,241,.06);font-size:11px;}
    .gap-item:last-child{border-bottom:none;}
    .gap-label{color:rgba(255,249,241,.7);}
    .gap-amount{font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;}
    .gap-amount.positive{color:#F9C14F;}
    .gap-amount.zero{color:rgba(255,249,241,.3);}

    /* ALARM */
    .alarm{margin:0 20px 20px;padding:16px;background:#C7243E;display:none;}
    .alarm.show{display:block;}
    .alarm-title{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,249,241,.8);margin-bottom:6px;}
    .alarm-text{font-size:12px;color:#FFF9F1;}

    /* LOADING */
    .loading{text-align:center;padding:60px 20px;color:rgba(255,249,241,.3);font-size:11px;}

    .footer{padding:20px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,249,241,.2);text-align:center;}
  </style>
</head>
<body>

<div class="header">
  <div class="wordmark">canica</div>
  <div class="time" id="clock">cargando...</div>
</div>

<div class="day-label" id="day-label">hoy</div>

<div class="revenue-block">
  <div class="revenue-today" id="revenue-today"><span class="unit">$</span><span id="rev-num">—</span></div>
  <div class="revenue-sub" id="revenue-sub">cargando datos...</div>
</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span>$0</span>
    <span id="target-label">meta: —</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="grid">
  <div class="metric">
    <div class="metric-label">tickets hoy</div>
    <div class="metric-value neutral" id="tickets">—</div>
    <div class="metric-sub" id="tickets-sub">meta: ~28/día</div>
  </div>
  <div class="metric">
    <div class="metric-label">ticket promedio</div>
    <div class="metric-value neutral" id="avg-ticket">—</div>
    <div class="metric-sub">meta: $350+</div>
  </div>
  <div class="metric">
    <div class="metric-label">faltan para meta</div>
    <div class="metric-value neutral" id="gap">—</div>
    <div class="metric-sub" id="gap-sub"> </div>
  </div>
  <div class="metric">
    <div class="metric-label">ritmo diario</div>
    <div class="metric-value neutral" id="pace">—</div>
    <div class="metric-sub">proyectado al cierre</div>
  </div>
</div>

<div class="gap-block" id="gap-block" style="display:none;">
  <div class="gap-title">¿Cómo cerrar el gap?</div>
  <div id="gap-items"></div>
</div>

<div class="alarm" id="alarm">
  <div class="alarm-title">🚨 Alarma</div>
  <div class="alarm-text" id="alarm-text"></div>
</div>

<div class="footer" id="last-update">actualizando...</div>

<script>
const RID = '57feae50-e490-435f-b821-4dc86e89aadc';
const BASE = 'https://api.polotab.com';

// Day targets
const TARGETS = { 0:52000, 1:14000, 2:18000, 3:18000, 4:20000, 5:32000, 6:44000 };
const DAY_NAMES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

function cdmxNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Mexico_City' }));
}

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-MX');
}

function updateClock() {
  const now = cdmxNow();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = `${DAY_NAMES[now.getDay()]} ${h}:${m}`;
}

async function fetchData() {
  try {
    // Get Polotab token via the site's API
    const authRes = await fetch('/api/polotab-token');
    if (!authRes.ok) throw new Error('auth failed');
    const { token } = await authRes.json();

    const now = cdmxNow();
    const today = now.toISOString().slice(0,10);
    const start = new Date(`${today}T15:00:00.000Z`).getTime(); // 9am CDMX
    const end   = Date.now();

    const [payRes, ordRes] = await Promise.all([
      fetch(`${BASE}/api/v1/restaurants/${RID}/analytics/sales/total_payments/?startDate=${start}&endDate=${end}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      }),
      fetch(`${BASE}/api/v1/restaurants/${RID}/analytics/sales/total_orders/?startDate=${start}&endDate=${end}&offset=360`, {
        headers: { 'Authorization': `Bearer ${token}` }
      }),
    ]);

    const payData = await payRes.json();
    const ordData = await ordRes.json();

    // Parse
    const ridData = payData?.[RID] || {};
    let revenue = 0;
    for (const val of Object.values(ridData)) {
      if (typeof val === 'object') revenue += val.sell || 0;
    }

    const tickets = Array.isArray(ordData)
      ? ordData.reduce((s,r) => s + (r.totalOrders||0), 0) : 0;

    const avgTicket = tickets > 0 ? revenue / tickets : 0;

    // Day target
    const dayOfWeek = now.getDay();
    const target = TARGETS[dayOfWeek];
    const pct = Math.min(revenue / target * 100, 100);
    const gap = Math.max(target - revenue, 0);

    // Pace: extrapolate to end of day
    const openHour = 9, closeHour = 19.5;
    const hoursOpen = closeHour - openHour;
    const hoursSoFar = Math.max(now.getHours() + now.getMinutes()/60 - openHour, 0.5);
    const pace = hoursSoFar > 0 ? (revenue / hoursSoFar) * hoursOpen : 0;

    // Update UI
    document.getElementById('day-label').textContent = DAY_NAMES[dayOfWeek].toLowerCase();
    document.getElementById('rev-num').textContent = Math.round(revenue).toLocaleString('es-MX');
    document.getElementById('revenue-sub').textContent = `${Math.round(pct)}% de la meta del día`;
    document.getElementById('target-label').textContent = `meta: ${fmt(target)}`;

    const fill = document.getElementById('progress-fill');
    fill.style.width = `${pct}%`;
    fill.className = 'progress-fill ' + (pct >= 90 ? 'green' : pct >= 60 ? 'yellow' : 'red');

    const ticketEl = document.getElementById('tickets');
    ticketEl.textContent = tickets;
    ticketEl.className = 'metric-value ' + (tickets >= 20 ? 'good' : tickets >= 12 ? 'warn' : 'bad');

    const avgEl = document.getElementById('avg-ticket');
    avgEl.textContent = fmt(avgTicket);
    avgEl.className = 'metric-value ' + (avgTicket >= 350 ? 'good' : avgTicket >= 250 ? 'warn' : 'bad');

    const gapEl = document.getElementById('gap');
    gapEl.textContent = gap > 0 ? fmt(gap) : '✅ meta';
    gapEl.className = 'metric-value ' + (gap === 0 ? 'good' : gap < target*0.3 ? 'warn' : 'bad');

    const paceEl = document.getElementById('pace');
    paceEl.textContent = fmt(pace);
    paceEl.className = 'metric-value ' + (pace >= target ? 'good' : pace >= target*0.75 ? 'warn' : 'bad');

    // Gap diagnosis
    if (gap > 0) {
      const adultsNeeded = Math.round(gap / 350);
      const bentoConversions = Math.round(gap / 160);
      const secondDrinks = Math.round(gap / 90);

      document.getElementById('gap-block').style.display = 'block';
      document.getElementById('gap-items').innerHTML = `
        <div class="gap-item">
          <span class="gap-label">Subir ${adultsNeeded} adulto${adultsNeeded>1?'s':''} más a $350</span>
          <span class="gap-amount positive">${fmt(adultsNeeded*350)}</span>
        </div>
        <div class="gap-item">
          <span class="gap-label">Convertir ${bentoConversions} niño${bentoConversions>1?'s':''} a bento</span>
          <span class="gap-amount positive">${fmt(bentoConversions*160)}</span>
        </div>
        <div class="gap-item">
          <span class="gap-label">Segunda bebida en ${secondDrinks} mesa${secondDrinks>1?'s':''}</span>
          <span class="gap-amount positive">${fmt(secondDrinks*90)}</span>
        </div>
      `;
    } else {
      document.getElementById('gap-block').style.display = 'none';
    }

    // Alarm: if before noon and under $8K
    const alarm = document.getElementById('alarm');
    if (now.getHours() >= 12 && revenue < 8000) {
      alarm.classList.add('show');
      document.getElementById('alarm-text').textContent = `Son las ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')} y llevas ${fmt(revenue)}. Activa upsell inmediato.`;
    } else {
      alarm.classList.remove('show');
    }

    document.getElementById('last-update').textContent = `actualizado ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;

  } catch(e) {
    document.getElementById('revenue-sub').textContent = `error: ${e.message}`;
    document.getElementById('last-update').textContent = 'error de conexión — reintentando en 5 min';
  }
}

updateClock();
setInterval(updateClock, 10000);
fetchData();
setInterval(fetchData, 300000); // refresh every 5 min
</script>

</body>
</html>
