<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Canica</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#1a1411;color:#FFF9F1;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;}

    .header{padding:16px 16px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,249,241,.08);padding-bottom:12px;}
    .wordmark{font-family:'DM Serif Display',serif;font-size:18px;font-style:italic;}
    .clock{font-size:10px;letter-spacing:.1em;color:rgba(255,249,241,.4);}

    .section{padding:14px 16px;border-bottom:1px solid rgba(255,249,241,.08);}
    .section-title{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,249,241,.35);margin-bottom:10px;}

    /* Revenue */
    .revenue-big{font-family:'DM Serif Display',serif;font-size:52px;font-style:italic;line-height:1;}
    .revenue-big .unit{font-size:22px;color:rgba(255,249,241,.5);}
    .revenue-meta{display:flex;gap:12px;margin-top:6px;font-size:10px;color:rgba(255,249,241,.5);}

    /* Progress */
    .progress-wrap{margin-top:10px;}
    .progress-labels{display:flex;justify-content:space-between;font-size:9px;color:rgba(255,249,241,.35);margin-bottom:5px;}
    .progress-track{background:rgba(255,249,241,.1);height:6px;}
    .progress-fill{height:6px;transition:width .5s;}
    .red{background:#C7243E;} .yellow{background:#F9C14F;} .green{background:#0B6C31;}

    /* Metric grid */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;}
    .metric{background:rgba(255,249,241,.05);padding:12px 10px;}
    .metric-label{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,249,241,.3);margin-bottom:5px;}
    .metric-value{font-family:'DM Serif Display',serif;font-size:28px;font-style:italic;line-height:1;}
    .metric-sub{font-size:9px;color:rgba(255,249,241,.3);margin-top:3px;}
    .good{color:#4CAF50;} .warn{color:#F9C14F;} .bad{color:#C7243E;} .neutral{color:#FFF9F1;}

    /* Items table */
    .items-table{width:100%;}
    .items-table td{padding:6px 0;border-bottom:1px solid rgba(255,249,241,.06);font-size:11px;}
    .items-table td:last-child{text-align:right;color:rgba(255,249,241,.6);}
    .items-table .item-name{color:#FFF9F1;font-weight:500;}
    .items-table .item-qty{color:rgba(255,249,241,.4);font-size:10px;}

    /* Staff */
    .staff-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,249,241,.06);}
    .staff-name{font-weight:500;}
    .staff-stats{font-size:10px;color:rgba(255,249,241,.5);text-align:right;}

    /* Alarm */
    .alarm{background:#C7243E;padding:14px 16px;display:none;}
    .alarm.show{display:block;}
    .alarm-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,249,241,.7);margin-bottom:6px;}

    /* Gap section */
    .gap-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,249,241,.06);font-size:11px;}
    .gap-label{color:rgba(255,249,241,.7);}
    .gap-val{font-family:'DM Serif Display',serif;font-size:15px;font-style:italic;color:#F9C14F;}

    .footer{padding:12px 16px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,249,241,.2);text-align:center;}
    .error{color:#C7243E;font-size:10px;padding:8px 0;}
  </style>
</head>
<body>

<div class="header">
  <div class="wordmark">canica</div>
  <div class="clock" id="clock">–</div>
</div>

<div class="section">
  <div class="section-title" id="day-label">hoy</div>
  <div class="revenue-big"><span class="unit">$</span><span id="rev-num">–</span></div>
  <div class="revenue-meta">
    <span id="pct-label">–% de meta</span>
    <span id="gap-label">–</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-labels"><span>$0</span><span id="target-label">–</span></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">métricas clave</div>
  <div class="grid-3">
    <div class="metric">
      <div class="metric-label">Comandas</div>
      <div class="metric-value neutral" id="tickets">–</div>
      <div class="metric-sub" id="tickets-sub"> </div>
    </div>
    <div class="metric">
      <div class="metric-label">Ticket prom.</div>
      <div class="metric-value neutral" id="avg-ticket">–</div>
      <div class="metric-sub">meta $350</div>
    </div>
    <div class="metric">
      <div class="metric-label">Ritmo</div>
      <div class="metric-value neutral" id="pace">–</div>
      <div class="metric-sub">proyect. cierre</div>
    </div>
    <div class="metric">
      <div class="metric-label">Niños hoy</div>
      <div class="metric-value neutral" id="ludo">–</div>
      <div class="metric-sub" id="ludo-sub">entradas</div>
    </div>
    <div class="metric">
      <div class="metric-label">Niños comieron</div>
      <div class="metric-value neutral" id="bento">–</div>
      <div class="metric-sub">meta 80%+</div>
    </div>
    <div class="metric">
      <div class="metric-label">Bebidas/mesa</div>
      <div class="metric-value neutral" id="drinks">–</div>
      <div class="metric-sub">meta 1.5+</div>
    </div>
  </div>
</div>

<div class="section" id="gap-section" style="display:none;">
  <div class="section-title">¿cómo cerrar el gap hoy?</div>
  <div id="gap-items"></div>
</div>

<div class="section" id="items-section" style="display:none;">
  <div class="section-title">lo más vendido hoy</div>
  <table class="items-table" id="items-table"></table>
</div>

<div class="section" id="staff-section" style="display:none;">
  <div class="section-title">meseros</div>
  <div id="staff-list"></div>
</div>

<div class="alarm" id="alarm">
  <div class="alarm-title">🚨 alarma</div>
  <div id="alarm-text"></div>
</div>

<div class="footer" id="last-update">cargando datos de Polotab...</div>

<script>
const RID     = '57feae50-e490-435f-b821-4dc86e89aadc';
const BASE    = 'https://api.polotab.com';
const TARGETS = {0:52000,1:14000,2:18000,3:18000,4:20000,5:32000,6:44000};
const DAYS    = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

function cdmxNow() {
  return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Mexico_City'}));
}
function fmt(n) { return '$'+Math.round(n).toLocaleString('es-MX'); }
function el(id) { return document.getElementById(id); }

function updateClock() {
  const now = cdmxNow();
  el('clock').textContent = `${DAYS[now.getDay()]} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
}

async function load() {
  try {
    // Read pre-built JSON (updated every 5 min by Mac mini cron)
    const dataRes = await fetch('/data/dashboard.json?t=' + Date.now());
    if (!dataRes.ok) throw new Error(`Data error ${dataRes.status} — actualizando en 5 min`);
    const d = await dataRes.json();

    const now    = cdmxNow();
    const dow    = d.dow;
    const target = d.target;
    const revenue   = d.revenue || 0;
    const tickets   = d.tickets || 0;
    const avgTicket = d.avgTicket || 0;
    const drinksQty = d.drinksQty || 0;
    const ludoQty   = d.ludoQty || 0;
    const kidsFoodQty = d.kidsFoodQty || 0;
    const itemRows  = d.items || [];

    // Show data freshness
    if (d.updatedAt) {
      const age = Math.round((Date.now() - new Date(d.updatedAt).getTime()) / 60000);
      el('last-update').textContent = `datos de hace ${age} min · ${d.updatedAt.slice(11,16)} UTC`;
    }

    const drinksRatio = tickets>0 ? drinksQty/tickets : 0;
    const bentoPct    = ludoQty>0 ? Math.round(kidsFoodQty/ludoQty*100) : null;
    const pct         = Math.round(revenue/target*100);
    const gap         = Math.max(target-revenue,0);

    // Pace
    const openH=9, closeH=19.5;
    const hoursOpen = closeH-openH;
    const hoursSoFar = Math.max(now.getHours()+now.getMinutes()/60-openH, 0.5);
    const pace = hoursSoFar>0 ? (revenue/hoursSoFar)*hoursOpen : 0;

    // ── UPDATE UI ──
    el('day-label').textContent = DAYS[dow].toLowerCase();
    el('rev-num').textContent   = Math.round(revenue).toLocaleString('es-MX');
    el('pct-label').textContent = `${pct}% de meta`;
    el('gap-label').textContent = gap>0 ? `faltan ${fmt(gap)}` : '✅ meta cumplida';
    el('target-label').textContent = `meta ${fmt(target)}`;

    const fill = el('progress-fill');
    fill.style.width = `${Math.min(pct,100)}%`;
    fill.className = 'progress-fill '+(pct>=95?'green':pct>=65?'yellow':'red');

    // Tickets
    const ticketTarget = Math.round(target/350);
    el('tickets').textContent = tickets;
    el('tickets').className = `metric-value ${tickets>=ticketTarget?'good':tickets>=ticketTarget*0.7?'warn':'bad'}`;
    el('tickets-sub').textContent = `necesitas ~${ticketTarget}`;

    // Avg ticket
    el('avg-ticket').textContent = fmt(avgTicket);
    el('avg-ticket').className = `metric-value ${avgTicket>=350?'good':avgTicket>=270?'warn':'bad'}`;

    // Pace
    el('pace').textContent = fmt(pace);
    el('pace').className = `metric-value ${pace>=target?'good':pace>=target*0.75?'warn':'bad'}`;

    // Ludo
    el('ludo').textContent = ludoQty||'–';
    el('ludo').className = 'metric-value neutral';
    el('ludo-sub').textContent = ludoQty>0?`${ludoQty} niños`:'sin datos';

    // Bento
    if (ludoQty>0&&bentoPct!==null) {
      el('bento').textContent = `${bentoPct}%`;
      el('bento').className = `metric-value ${bentoPct>=80?'good':bentoPct>=60?'warn':'bad'}`;
    } else {
      el('bento').textContent = '–';
      el('bento').className = 'metric-value neutral';
    }

    // Drinks
    if (drinksQty>0) {
      el('drinks').textContent = drinksRatio.toFixed(1);
      el('drinks').className = `metric-value ${drinksRatio>=1.5?'good':drinksRatio>=1.0?'warn':'bad'}`;
    } else {
      el('drinks').textContent = '–';
      el('drinks').className = 'metric-value neutral';
    }

    // Gap section
    if (gap>500) {
      el('gap-section').style.display='block';
      const adultsNeeded = Math.round(gap/350);
      const bentoConv = Math.round(gap/160);
      const drinks2 = Math.round(gap/90);
      el('gap-items').innerHTML = `
        <div class="gap-item"><span class="gap-label">${adultsNeeded} adulto${adultsNeeded>1?'s':''} más a $350</span><span class="gap-val">${fmt(adultsNeeded*350)}</span></div>
        <div class="gap-item"><span class="gap-label">${bentoConv} bento${bentoConv>1?'s':''} más</span><span class="gap-val">${fmt(bentoConv*160)}</span></div>
        <div class="gap-item"><span class="gap-label">Segunda bebida en ${drinks2} mesa${drinks2>1?'s':''}</span><span class="gap-val">${fmt(drinks2*90)}</span></div>
      `;
    }

    // Items
    if (itemRows.length>0) {
      el('items-section').style.display='block';
      itemRows.sort((a,b)=>b.rev-a.rev);
      el('items-table').innerHTML = itemRows.slice(0,8).map(i=>
        `<tr><td><span class="item-name">${i.name}</span> <span class="item-qty">${i.qty}×</span></td><td>${fmt(i.rev)}</td></tr>`
      ).join('');
    }

    // Alarm
    if (now.getHours()>=12 && revenue<8000) {
      el('alarm').classList.add('show');
      el('alarm-text').textContent = `Son las ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')} y llevas ${fmt(revenue)}. Activa: ofrece platillo a cada mesa, bento a niños sin comer, segunda bebida.`;
    }

    el('last-update').textContent = `actualizado ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')} · refresca cada 5 min`;

  } catch(e) {
    el('last-update').textContent = `error: ${e.message}`;
    el('last-update').style.color = '#C7243E';
    console.error(e);
  }
}

updateClock();
setInterval(updateClock, 10000);
load();
setInterval(load, 300000);
</script>

</body>
</html>
